<script>
/* Lightweight Markdown renderer — covers headings, bold/italic,
   code fences, inline code, lists, tables, blockquotes, links, HR */
const marked = (function() {
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inlineEsc(s) {
    // code spans first to protect their content
    s = s.replace(/`([^`]+)`/g, (_,c) => `<code>${esc(c)}</code>`);
    // bold + italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
    // links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }

  function parse(md) {
    const lines = md.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];

      // Fenced code block
      if (/^```/.test(line)) {
        const lang = line.slice(3).trim();
        i++;
        let code = '';
        while (i < lines.length && !/^```/.test(lines[i])) {
          code += esc(lines[i]) + '\n';
          i++;
        }
        html += `<pre><code class="language-${esc(lang)}">${code}</code></pre>`;
        i++; // skip closing ```
        continue;
      }

      // Horizontal rule
      if (/^---+$|^\*\*\*+$|^___+$/.test(line.trim())) {
        html += '<hr>';
        i++;
        continue;
      }

      // Headings
      const hMatch = line.match(/^(#{1,6})\s+(.*)/);
      if (hMatch) {
        const level = hMatch[1].length;
        html += `<h${level}>${inlineEsc(hMatch[2])}</h${level}>`;
        i++;
        continue;
      }

      // Blockquote
      if (/^>\s?/.test(line)) {
        let bq = '';
        while (i < lines.length && /^>\s?/.test(lines[i])) {
          bq += lines[i].replace(/^>\s?/, '') + '\n';
          i++;
        }
        html += `<blockquote>${parse(bq)}</blockquote>`;
        continue;
      }

      // Table (needs at least header + separator lines)
      if (/\|/.test(line) && i + 1 < lines.length && /^\|?\s*[-:]+[-|\s:]*$/.test(lines[i + 1])) {
        const rows = [];
        while (i < lines.length && /\|/.test(lines[i])) {
          rows.push(lines[i]);
          i++;
        }
        // first row = header, second = separator, rest = body
        const toCell = (r, tag) =>
          r.replace(/^\||\|$/g,'').split('|')
            .map(c => `<${tag}>${inlineEsc(c.trim())}</${tag}>`).join('');
        html += '<table>';
        html += `<thead><tr>${toCell(rows[0],'th')}</tr></thead>`;
        if (rows.length > 2) {
          html += '<tbody>';
          for (let r = 2; r < rows.length; r++) {
            html += `<tr>${toCell(rows[r],'td')}</tr>`;
          }
          html += '</tbody>';
        }
        html += '</table>';
        continue;
      }

      // Unordered list
      if (/^[-*+]\s/.test(line)) {
        html += '<ul>';
        while (i < lines.length && /^[-*+]\s/.test(lines[i])) {
          html += `<li>${inlineEsc(lines[i].replace(/^[-*+]\s+/, ''))}</li>`;
          i++;
        }
        html += '</ul>';
        continue;
      }

      // Ordered list
      if (/^\d+\.\s/.test(line)) {
        html += '<ol>';
        while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
          html += `<li>${inlineEsc(lines[i].replace(/^\d+\.\s+/, ''))}</li>`;
          i++;
        }
        html += '</ol>';
        continue;
      }

      // Empty line
      if (line.trim() === '') {
        i++;
        continue;
      }

      // Paragraph
      let para = '';
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^#{1,6}\s/.test(lines[i]) && !/^[-*+]\s/.test(lines[i]) &&
             !/^\d+\.\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) &&
             !/^```/.test(lines[i]) && !/^---+$|^\*\*\*+$|^___+$/.test(lines[i].trim()) &&
             !/\|/.test(lines[i])) {
        para += lines[i] + ' ';
        i++;
      }
      if (para.trim()) {
        html += `<p>${inlineEsc(para.trim())}</p>`;
      }
    }
    return html;
  }

  return { parse };
})();
</script>

      title:    'IoT / AI Security Platform',
      subtitle: '🏭 Industrial IoT Defense',
      cat:      'cloud',
      catLabel: 'AI Security'
    }
  };

  const GITHUB_BASE     = 'https://github.com/H1v3-lab/cybersecurity-portfolio/tree/main/projects/';
  const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/H1v3-lab/cybersecurity-portfolio/main/projects/';

  // ── Resolve lab ID from URL ────────────────────────────────────
  function getLabId() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('lab') || '';
    // Accept only 1-2 digit numeric values (01–25)
    const id = /^\d{1,2}$/.test(raw.trim()) ? raw.trim().padStart(2, '0') : null;
    return id && id in PROJECTS ? id : null;
  }

  // ── Render header ──────────────────────────────────────────────
  function renderHeader(id, project) {
    const header = document.getElementById('detailHeader');
    header.innerHTML = `
      <div class="detail-lab-num">LAB_${id}</div>
      <h1 class="detail-title">${escHtml(project.title)}</h1>
      <div class="detail-subtitle">${escHtml(project.subtitle)}</div>
      <div class="detail-meta">
        <span class="detail-cat cat-${project.cat}">${escHtml(project.catLabel)}</span>
      </div>
    `;
  }

  // ── Render error ───────────────────────────────────────────────
  function renderError(msg) {
    document.getElementById('detailHeader').innerHTML =
      `<div class="detail-error">// ERROR: ${escHtml(msg)}</div>`;
  }

  // ── Minimal HTML escape ────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Initialise ─────────────────────────────────────────────────
  async function init() {
    const id = getLabId();

    if (!id) {
      renderError('Unknown lab ID. Please return to the portfolio.');
      return;
    }

    const project = PROJECTS[id];
    renderHeader(id, project);

    // Set GitHub link
    const ghLink = document.getElementById('githubLink');
    ghLink.href = GITHUB_BASE + project.folder;

    // Fetch README — try local path first, fall back to GitHub raw URL
    // (local fetch fails with NetworkError when opened via file:// protocol)
    const readmeUrl    = `projects/${project.folder}/README.md`;
    const rawGithubUrl = GITHUB_RAW_BASE + `${project.folder}/README.md`;
    try {
      let mdText;
      try {
        const res = await fetch(readmeUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        mdText = await res.text();
      } catch (_err) {
        // Local fetch unavailable (e.g. file:// protocol) — use GitHub raw
        const res = await fetch(rawGithubUrl);
        if (!res.ok) throw new Error(`README not found (HTTP ${res.status})`);
        mdText = await res.text();
      }

      const bodyEl = document.getElementById('detailBody');
      bodyEl.innerHTML = marked.parse(mdText);

      // Make all links inside markdown open in new tab
      bodyEl.querySelectorAll('a').forEach(a => {
        if (a.hostname && a.hostname !== window.location.hostname) {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
        }
      });

      document.getElementById('detailFooter').style.display = 'flex';
    } catch (err) {
      document.getElementById('detailBody').innerHTML =
        `<div class="detail-error">// Could not load project documentation: ${escHtml(err.message)}</div>`;
      document.getElementById('detailFooter').style.display = 'flex';
    }
  }

  init();
</script>
